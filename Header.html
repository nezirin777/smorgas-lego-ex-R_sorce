<!-- chaika-version: 1.9.1 /** @file Header.html */ -->
<html>

<head>
  <title><THREADNAME/></title>
  <style type="text/css">
    body {
      font: <FONTSIZE/> <FONTNAME/>
    }

    .aaRes {
      display: inline-block;
      font: <AAFONTSIZE/> <AAFONTNAME/>;
      line-height: <AALINEHEIGHT/>
    }
  </style>
  <script type="application/javascript" src="<SKINPATH/>options.js"></script>
  <script type="application/javascript" src="<SKINPATH/>boardtable.js"></script>
  <link rel="icon" type="image/png" href="<SKINPATH/>img/favicon/favicon.png" />
</head>

<body>
  <div id="popupdummy"></div>
  <div id="header" serverurl="<SERVERURL/>" boardurl="<BOARDURL/>" threadurl="<THREADURL/>" skinpath="<SKINPATH/>">
    <h1>
      <a href="chaika://board/<BOARDURL/>" id="boardName" title="スレッド一覧を表示"></a>
      <span id="threadName" title="<THREADNAME/>">
        <THREADNAME />
      </span>
      <span id="resCount"></span>
      <span id="statusText" class="throbber" accesskey="L" title="新着レスへ移動"></span>
      <span id="datSize"></span>
    </h1>
    <span id="command">
      <ul>
        <li id="autoReload" title="自動更新On/Off"></li>
        <li id="autoScroll" class="scrolloff" title="オートスクロール"></li>
        <li id="threadMenu" class="div">
          <select size="1" id="reloadMenu">
            <option value="l50">Last 50
            <option value="">ALL
            <option value="input">Select
            <option value="1-10">1-10
            <option value="1-25">1-25
            <option value="X" selected>Jump to
          </select>
        </li>
        <li id="goPrev" class="div" title="前へ"></li>
        <li id="showAll" class="div" title="すべて表示"><span id="showAllText">すべて表示</span></li>
        <li id="writeTo" class="div" title="書き込む"><span id="writeToText">書き込む</span></li>
        <li id="find" title="検索/抽出"><span id="findText">検索</span></li>
        <li id="chevron"><span id="chevronText">&gt;&gt;&nbsp;</span>&nbsp;</li>
      </ul>
    </span>
    <div id="findbox">
      <div>
        <div>
          <div>
            <div>
              <div id="findboxClear"><input type="text" id="findboxText"></input></div>
              <select id="findObject">
                <option value="resOrg">検索対象</option>
                <option value="resBody">レス本文</option>
                <option value="resNumber">レス番号</option>
                <option value="resName">名前欄</option>
                <option value="resMail">メール欄</option>
                <option value="resDate">日付</option>
                <option value="resID">ID</option>
                <option value="resBeID">BeID</option>
              </select>
              <select id="findContent">
                <option value="in" selected>を含む</option>
                <option value="out">を含まない</option>
              </select>
              <select id="findShow">
                <option value="only" selected>抽出</option>
                <option value="mark">強調</option>
              </select>
              <input type="checkbox" valign="center" id="findStrong">反転
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="showBar" title="ヘッダ表示"><span id="showBarText">▼</span></div>
  <div id="TemplateBody"></div>

  <div id="content">
